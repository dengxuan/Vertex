// Test-only RPC messages for the /compat/hello-rpc scenario.
// Both .NET and Go sides regenerate code from this file.

syntax = "proto3";

package vertex.compat.hello_rpc.v1;

option csharp_namespace = "Vertex.Compat.HelloRpc.V1";
option go_package = "vertex-hello-rpc-compat/gen;gen";

// Go client → .NET server.
message CreateRoomRequest {
  string room_name = 1;
}

// .NET server → Go client.
message RoomCreatedResponse {
  string room_id  = 1;
  string greeting = 2;
}
