// Minimal subset of L8CHAT/payment-protos/feivoo/payment/messages/wallet.proto
// — just the one request / response pair this compat scenario exercises.
//
// Keep `package feivoo.payment` and the field numbers in sync with the
// upstream proto so the topic name computed by MessageTopic.For<T>()
// matches on both sides of the wire. Topic format on this RPC:
//
//   feivoo.payment.WalletBalanceQuery   (request)
//   feivoo.payment.WalletBalanceQueryAck (response)

syntax = "proto3";

package feivoo.payment;

option csharp_namespace = "Feivoo.Payment.Grpc.Proto";
option go_package = "vertex-payment-wallet-query-compat/gen;gen";

message WalletBalance {
  string currency_id    = 1;
  double amount         = 2;
  double frozen_amount  = 3;
}

message WalletBalanceQuery {
  string user_id     = 1;
  string currency_id = 2;
}

message WalletBalanceQueryAck {
  WalletBalance balance = 1;
}
