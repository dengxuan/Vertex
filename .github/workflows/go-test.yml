name: Go Tests

on:
  push:
    branches: [main]
    paths:
      - 'go/**'
      - 'protos/**'
      - '.github/workflows/go-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'go/**'
      - 'protos/**'
      - '.github/workflows/go-test.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v5

      - name: Check for Go code
        id: haveCode
        run: |
          if [ -f go.mod ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "No go.mod yet — skipping vet/test. This is expected during the initial spin-out from Skywalker."
          fi

      - uses: actions/setup-go@v5
        if: steps.haveCode.outputs.present == 'true'
        with:
          go-version: '1.22'

      - name: Tidy check
        if: steps.haveCode.outputs.present == 'true'
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod/go.sum drift"; exit 1)

      - name: Vet
        if: steps.haveCode.outputs.present == 'true'
        run: go vet ./...

      - name: Test
        if: steps.haveCode.outputs.present == 'true'
        run: go test -race -cover ./...
