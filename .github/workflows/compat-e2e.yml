name: Compat E2E

on:
  push:
    branches: [main]
    paths:
      - 'dotnet/**'
      - 'go/**'
      - 'protos/**'
      - 'spec/**'
      - 'compat/**'
      - '.github/workflows/compat-e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dotnet/**'
      - 'go/**'
      - 'protos/**'
      - 'spec/**'
      - 'compat/**'
      - '.github/workflows/compat-e2e.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compat:
    # Placeholder — runs only manually until compat/ scenarios land.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: echo "Compat E2E scaffold. Real scenarios will land with the Go implementation."
