// Vertex envelope proto — RESERVED for future migration.
//
// Wire format v1 uses a 4-physical-frame envelope (see /spec/wire-format.md §2),
// which is language-neutral and adequate for ZeroMQ (native multi-frame) and gRPC
// (via a TransportFrame wrapper, see transport/grpc/v1/bidi.proto).
//
// If a future transport needs a single-blob envelope (HTTP POST, RabbitMQ, etc.),
// we will populate this file with an Envelope message that flattens the 4 frames
// into one Protobuf message. Until then, this file exists as a placeholder for
// the namespace reservation.
//
// DO NOT reference this file from code yet.

syntax = "proto3";

package vertex.v1;

option csharp_namespace = "Vertex.Protocol.V1";
option go_package = "github.com/dengxuan/vertex/go/protocol/v1;protocolv1";

// Placeholder. See file-level comment.
message Reserved {}
